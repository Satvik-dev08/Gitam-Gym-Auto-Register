name: Gym Slot Booking

on:
  schedule:
    - cron: '29 11 * * *'

  # Also allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  book-gym:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install system dependencies required by Chromium/Puppeteer
      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libxrandr2 \
            libxdamage1 \
            libxcomposite1 \
            libxfixes3 \
            libxext6 \
            libx11-6

      - name: Install npm dependencies
        run: npm ci

      - name: Run gym booking script
        env:
          USERNAME: ${{ secrets.GITAM_USERNAME }}
          PASSWORD: ${{ secrets.GITAM_PASSWORD }}
        run: node index.js