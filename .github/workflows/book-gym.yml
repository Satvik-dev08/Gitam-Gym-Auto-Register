name: Gym Slot Booking

on:
  # ⏰ Runs every day at 11:00 AM IST (5:30 AM UTC)
  # To change the time, edit the cron line below
  # IST = UTC + 5:30, so subtract 5:30 from your desired IST time to get UTC
  # Examples:
  #   10:00 AM IST = 4:30 AM UTC  → '30 4 * * *'
  #   12:00 PM IST = 6:30 AM UTC  → '30 6 * * *'
  schedule:
    - cron: '52 10 * * *'

  # ▶️ Also lets you trigger it manually from the Actions tab on GitHub
  workflow_dispatch:

jobs:
  book-gym:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✅ Setup Chrome BEFORE installing dependencies
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # ✅ Clean install every time — no cache (avoids corrupted node_modules)
      - name: Install dependencies
        run: npm ci

      - name: Run gym booking script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node index.js